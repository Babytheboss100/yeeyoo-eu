services:
  - type: web
    name: yeeyoo-eu-backend
    runtime: node
    region: frankfurt
    plan: starter
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && node src/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: yeeyoo-eu-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: yeeyoo-eu-frontend
    runtime: static
    rootDir: frontend
    buildCommand: echo "Static site"
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    autoDeploy: true

databases:
  - name: yeeyoo-eu-db
    region: frankfurt
    plan: starter
